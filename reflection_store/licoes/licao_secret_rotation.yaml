id: licao_secret_rotation
origem: incidente_golf_001
criada_em: 2025-10-23
licao: worker parado sem deploy + erro de auth checar rotacao de secret
contexto: rotacao automatica de credenciais (Vault, etc) pode nao propagar pra todos os consumidores
aplicavel_quando:
  - sintoma_contem: ["worker", "auth", "401", "403", "parado"]
  - sem_deploy_recente: true
acao_sugerida: verificar ultima rotacao de secret + redeploy/restart dos consumidores
